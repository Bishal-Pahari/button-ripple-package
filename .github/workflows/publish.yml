name: Publish

# Publishes to npm on a version tag using npm Trusted Publishing (OIDC) with
# provenance — no long-lived NPM_TOKEN is stored in the repo.
#
# One-time setup (npmjs.com → package → Settings → Trusted Publisher):
#   provider: GitHub Actions
#   repository: Bishal-Pahari/button-ripple-package
#   workflow: publish.yml
# Then publish by pushing a tag, e.g. `git tag v1.3.1 && git push origin v1.3.1`.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # Node 24 ships npm 11.x; ensure >= 11.5.1 as required by Trusted Publishing.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      # Provenance is generated automatically (publishConfig.provenance + OIDC).
      - run: npm publish

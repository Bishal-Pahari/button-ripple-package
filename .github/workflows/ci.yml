name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # Reproducible install from the committed lockfile.
      - run: npm ci
      - run: npm run build
      # Fail the build on high/critical advisories in the dependency tree.
      - run: npm audit --audit-level=high
